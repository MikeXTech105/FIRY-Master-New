<div class="page">

  <div class="role-card">

    <h2>Create New Role</h2>
    <p class="subtitle">Add a new role to FIRY system</p>

    <div class="form-group">

      <label>Role Name</label>

      <input
        type="text"
        placeholder="Enter role name"
        #roleName
      />

    </div>

    <button
      class="create-btn"
      (click)="createRole(roleName.value)"
    >
      Create Role
    </button>

  </div>

</div>
